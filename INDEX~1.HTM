<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wayni · Tu opinión importa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #C6FF00;
      --black:  #0D0D0D;
      --gray:   #555;
      --light:  #F7F7F3;
      --border: #E0E0D8;
      --red:    #E53935;
      --amber:  #FB8C00;
      --radius: 14px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--light); color: var(--black);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start; padding: 0 16px 40px;
    }
    .header {
      width: 100%; max-width: 520px; display: flex;
      align-items: center; gap: 10px; padding: 24px 0 20px;
    }
    .logo {
      width: 42px; height: 42px; background: var(--green); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 18px; letter-spacing: -1px; color: var(--black); flex-shrink: 0;
    }
    .brand { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .card {
      width: 100%; max-width: 520px; background: #fff;
      border-radius: var(--radius); border: 1px solid var(--border);
      padding: 32px 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
      padding: 4px 10px; border-radius: 20px; margin-bottom: 20px;
    }
    .badge.detractor { background: #FFEBEE; color: var(--red); }
    .badge.neutro    { background: #FFF8E1; color: var(--amber); }
    .badge.promotor  { background: #F1F8E9; color: #33691E; }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .badge.detractor .dot { background: var(--red); }
    .badge.neutro    .dot { background: var(--amber); }
    .badge.promotor  .dot { background: #66BB6A; }
    .score-display { display: flex; align-items: baseline; gap: 4px; margin-bottom: 8px; }
    .score-num { font-size: 56px; font-weight: 900; line-height: 1; letter-spacing: -3px; }
    .score-of { font-size: 20px; color: var(--gray); font-weight: 400; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
    .subtitle { font-size: 15px; color: var(--gray); line-height: 1.5; margin-bottom: 24px; }
    .divider { height: 1px; background: var(--border); margin: 24px 0; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    textarea {
      width: 100%; min-height: 110px; border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: inherit;
      resize: vertical; outline: none; transition: border-color .2s; color: var(--black);
    }
    textarea:focus { border-color: var(--black); }
    textarea::placeholder { color: #AAA; }
    .char-count { font-size: 12px; color: #AAA; text-align: right; margin-top: 4px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px 20px; margin-top: 16px;
      border: none; border-radius: 10px; cursor: pointer;
      font-size: 16px; font-weight: 700; font-family: inherit;
      text-decoration: none; transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--black); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-green  { background: var(--green); color: var(--black); }
    .btn-green:hover { opacity: .88; }
    .btn-outline {
      background: transparent; color: var(--black);
      border: 1.5px solid var(--border); margin-top: 10px;
    }
    .btn-outline:hover { background: var(--light); }
    .store-card {
      display: flex; align-items: center; gap: 14px; padding: 16px;
      border: 1.5px solid var(--border); border-radius: 12px; margin-top: 20px;
      text-decoration: none; color: inherit; transition: border-color .2s, background .2s;
    }
    .store-card:hover { border-color: #666; background: var(--light); }
    .store-icon { font-size: 32px; flex-shrink: 0; }
    .store-label { font-size: 11px; color: var(--gray); }
    .store-name  { font-size: 15px; font-weight: 700; }
    .stars { color: #FFA000; font-size: 16px; letter-spacing: 1px; margin-top: 2px; }
    .success-icon {
      width: 60px; height: 60px; border-radius: 50%; background: var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin: 0 auto 20px;
    }
    .success-card { text-align: center; }
    .state-msg { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 15px; }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 16px;
      border: 3px solid var(--border); border-top-color: var(--black);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { margin-top: 28px; text-align: center; font-size: 12px; color: #AAA; max-width: 520px; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">W.</div>
  <span class="brand">Wayni</span>
</div>
<div class="card" id="card">
  <div class="state-msg"><div class="spinner"></div>Cargando tu encuesta...</div>
</div>
<div class="footer">
  Tu respuesta es confidencial y nos ayuda a mejorar.<br>
  &copy; 2026 Wayni &middot; <a href="https://wayni.com" style="color:#AAA">wayni.com</a>
</div>

<script>
  // ── CONFIGURACIÓN ─────────────────────────────────────────────────────────
  // Reemplazá esta URL con la de tu Google Apps Script desplegado
  const WEBHOOK_URL   = "https://script.google.com/macros/s/TU_DEPLOYMENT_ID/exec";
  const PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.waynimovilwallet";

  // ── Leer parámetros ───────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const score  = parseInt(params.get("score"), 10);
  const ticket = params.get("ticket") || "";

  function getSegmento(s) {
    if (s <= 6) return "detractor";
    if (s <= 8) return "neutro";
    return "promotor";
  }

  async function enviarRespuesta(comentario) {
    const payload = {
      ticket_id:  ticket,
      score:      score,
      segmento:   getSegmento(score),
      comentario: comentario || "",
      timestamp:  new Date().toISOString()
    };
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    } catch(e) { /* silencioso en prod */ }
  }

  const card = document.getElementById("card");

  function render() {
    if (isNaN(score) || score < 0 || score > 10) {
      card.innerHTML = `<div class="state-msg">
        <div style="font-size:40px;margin-bottom:12px">&#128279;</div>
        <strong>Enlace inv&aacute;lido</strong><br>
        Hac&eacute; click en el n&uacute;mero directamente desde el email que recibiste.
      </div>`;
      return;
    }
    const seg = getSegmento(score);
    if (seg === "detractor") renderDetractor();
    else if (seg === "neutro") renderNeutro();
    else renderPromotor();
  }

  // ─── DETRACTOR (0-6) ──────────────────────────────────────────────────────
  function renderDetractor() {
    card.innerHTML = `
      <div class="badge detractor"><span class="dot"></span> Tu respuesta</div>
      <div class="score-display">
        <span class="score-num" style="color:#E53935">${score}</span>
        <span class="score-of">/10</span>
      </div>
      <h1>Lamentamos que tu experiencia no haya sido la esperada</h1>
      <p class="subtitle">Tu opini&oacute;n es muy importante para nosotros.<br>
      &iquest;Pod&eacute;s contarnos qu&eacute; ocurri&oacute; o qu&eacute; podr&iacute;amos mejorar?</p>
      <div class="divider"></div>
      <label for="comentario">Tu comentario (opcional)</label>
      <textarea id="comentario" maxlength="500" placeholder="Cont&aacute;nos qu&eacute; pas&oacute; o qu&eacute; esperabas que fuera diferente..."></textarea>
      <div class="char-count"><span id="chars">0</span>/500</div>
      <button class="btn btn-primary" id="send-btn" onclick="submitDetractor()">Enviar respuesta</button>
      <button class="btn btn-outline" onclick="skipDetractor()">Prefiero no comentar</button>`;
    document.getElementById("comentario").addEventListener("input", function() {
      document.getElementById("chars").textContent = this.value.length;
    });
  }
  async function submitDetractor() {
    const btn = document.getElementById("send-btn");
    btn.disabled = true; btn.textContent = "Enviando...";
    await enviarRespuesta(document.getElementById("comentario").value.trim());
    showGraciasDetractor();
  }
  async function skipDetractor() { await enviarRespuesta(""); showGraciasDetractor(); }
  function showGraciasDetractor() {
    card.innerHTML = `<div class="success-card">
      <div class="success-icon">&#10003;</div>
      <h1>Gracias por contarnos</h1>
      <p class="subtitle" style="margin-top:10px">Tu comentario qued&oacute; registrado en nuestro equipo.<br>
      Vamos a trabajar para mejorar tu experiencia.</p></div>`;
  }

  // ─── NEUTRO (7-8) ─────────────────────────────────────────────────────────
  function renderNeutro() {
    card.innerHTML = `
      <div class="badge neutro"><span class="dot"></span> Tu respuesta</div>
      <div class="score-display">
        <span class="score-num" style="color:#FB8C00">${score}</span>
        <span class="score-of">/10</span>
      </div>
      <h1>&iexcl;Gracias por tu respuesta!</h1>
      <p class="subtitle">Seguimos trabajando d&iacute;a a d&iacute;a para mejorar tu experiencia.<br>
      &iquest;Qu&eacute; nos falt&oacute; para ganarnos tu 10?</p>
      <div class="divider"></div>
      <label for="mejora">Tu sugerencia (opcional)</label>
      <textarea id="mejora" maxlength="500" placeholder="&iquest;Qu&eacute; podr&iacute;a haber sido mejor?"></textarea>
      <div class="char-count"><span id="chars">0</span>/500</div>
      <button class="btn btn-primary" id="send-btn" onclick="submitNeutro()">Enviar sugerencia</button>
      <button class="btn btn-outline" onclick="skipNeutro()">Solo dejar mi puntuaci&oacute;n</button>`;
    document.getElementById("mejora").addEventListener("input", function() {
      document.getElementById("chars").textContent = this.value.length;
    });
  }
  async function submitNeutro() {
    const btn = document.getElementById("send-btn");
    btn.disabled = true; btn.textContent = "Enviando...";
    await enviarRespuesta(document.getElementById("mejora").value.trim());
    showGraciasNeutro();
  }
  async function skipNeutro() { await enviarRespuesta(""); showGraciasNeutro(); }
  function showGraciasNeutro() {
    card.innerHTML = `<div class="success-card">
      <div class="success-icon">&#10003;</div>
      <h1>&iexcl;Gracias!</h1>
      <p class="subtitle" style="margin-top:10px">Tu opini&oacute;n nos ayuda a mejorar cada d&iacute;a.<br>
      Te invitamos a seguir usando Wayni.</p></div>`;
  }

  // ─── PROMOTOR (9-10) ──────────────────────────────────────────────────────
  function renderPromotor() {
    card.innerHTML = `
      <div class="badge promotor"><span class="dot"></span> Tu respuesta</div>
      <div class="score-display">
        <span class="score-num" style="color:#33691E">${score}</span>
        <span class="score-of">/10</span>
      </div>
      <h1>&iexcl;Muchas gracias por tu valoraci&oacute;n!</h1>
      <p class="subtitle">Nos alegra saber que tu experiencia fue positiva.<br>
      &iquest;Nos ayud&aacute;s a seguir creciendo con una rese&ntilde;a?</p>
      <div class="divider"></div>
      <p style="font-size:14px;font-weight:600;margin-bottom:4px">Es muy r&aacute;pido &darr;</p>
      <a class="store-card" href="${PLAY_STORE_URL}" target="_blank">
        <span class="store-icon">&#9654;</span>
        <div>
          <div class="store-label">Disponible en</div>
          <div class="store-name">Google Play Store</div>
          <div class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
        </div>
      </a>
      <button class="btn btn-outline" style="margin-top:14px" onclick="skipPromotor()">
        Prefiero no dejar rese&ntilde;a
      </button>`;
    enviarRespuesta("");
  }
  function skipPromotor() {
    card.innerHTML = `<div class="success-card">
      <div class="success-icon">&#10003;</div>
      <h1>&iexcl;Gracias de todas formas!</h1>
      <p class="subtitle" style="margin-top:10px">Valoramos mucho que uses Wayni.</p></div>`;
  }

  render();
</script>
</body>
</html>
